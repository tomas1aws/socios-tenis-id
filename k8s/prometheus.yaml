apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: socios-tenis
  labels:
    app: prometheus
    component: server
    managed-by: socios-tenis
    part-of: observability
  annotations:
    description: Configuración mínima de Prometheus con scrape directo al servicio de la app
    kubernetes.io/description: Prometheus scrape config para socios-tenis
    checksum/config: "1"
data:
  prometheus.yml: |-
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: "socios-tenis"
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - socios-tenis
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app]
            action: keep
            regex: socios-tenis
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-deployment
  namespace: socios-tenis
  labels:
    app: prometheus
    component: server
    managed-by: socios-tenis
    part-of: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
      component: server
  template:
    metadata:
      labels:
        app: prometheus
        component: server
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.enable-lifecycle"
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
              readOnly: true
            - name: prometheus-storage
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: socios-tenis
  labels:
    app: prometheus
    component: server
    managed-by: socios-tenis
    part-of: observability
spec:
  type: NodePort
  selector:
    app: prometheus
    component: server
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
